<svg width="104" height="104" viewBox="0 0 104 104" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Spokes: phone edge to icon -->
  <line x1="52" y1="36" x2="52" y2="18" stroke="#111" stroke-width="2" stroke-linecap="round"/>
  <line x1="62" y1="42" x2="76" y2="28" stroke="#111" stroke-width="2" stroke-linecap="round"/>
  <line x1="62" y1="52" x2="80" y2="52" stroke="#111" stroke-width="2" stroke-linecap="round"/>
  <line x1="62" y1="62" x2="74" y2="74" stroke="#111" stroke-width="2" stroke-linecap="round"/>
  <line x1="52" y1="68" x2="52" y2="86" stroke="#111" stroke-width="2" stroke-linecap="round"/>
  <line x1="42" y1="62" x2="30" y2="74" stroke="#111" stroke-width="2" stroke-linecap="round"/>
  <line x1="42" y1="52" x2="24" y2="52" stroke="#111" stroke-width="2" stroke-linecap="round"/>
  <line x1="42" y1="42" x2="30" y2="30" stroke="#111" stroke-width="2" stroke-linecap="round"/>

  <!-- Phone silhouette -->
  <rect x="42" y="36" width="20" height="32" rx="4" stroke="#111" stroke-width="2" fill="white"/>

  <!-- TOP: Vision — circle + dot -->
  <circle cx="52" cy="10" r="6" stroke="#111" stroke-width="2" fill="none"/>
  <circle cx="52" cy="10" r="1.8" fill="#111"/>

  <!-- TOP-RIGHT: Audio — two arcs -->
  <path d="M71 24 C75 24, 80 29, 80 33" stroke="#111" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M72 19 C78 20, 84 26, 85 32" stroke="#111" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- RIGHT: Location — diamond -->
  <path d="M88 45 L95 52 L88 59 L81 52 Z" stroke="#111" stroke-width="2" fill="none" stroke-linejoin="round"/>

  <!-- BOTTOM-RIGHT: Touch — concentric circles -->
  <circle cx="80" cy="80" r="3.5" stroke="#111" stroke-width="2" fill="none"/>
  <circle cx="80" cy="80" r="8" stroke="#111" stroke-width="2" fill="none"/>

  <!-- BOTTOM: Voice — two arcs -->
  <path d="M44 90 Q52 84, 60 90" stroke="#111" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M46 96 Q52 91, 58 96" stroke="#111" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- BOTTOM-LEFT: Motion — chevron -->
  <path d="M27,87 L29,74 L16,76" stroke="#111" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- LEFT: Light — plus/cross -->
  <line x1="16" y1="44" x2="16" y2="60" stroke="#111" stroke-width="2" stroke-linecap="round"/>
  <line x1="8" y1="52" x2="24" y2="52" stroke="#111" stroke-width="2" stroke-linecap="round"/>

  <!-- TOP-LEFT: Smell — triangle -->
  <polygon points="30,30 16,27 27,16" stroke="#111" stroke-width="2" fill="none" stroke-linejoin="round"/>
</svg>
