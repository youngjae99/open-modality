name: iosApp
options:
  bundleIdPrefix: com.openmodality
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15.4"

settings:
  base:
    SWIFT_VERSION: "5.0"

targets:
  iosApp:
    type: application
    platform: iOS
    sources:
      - path: iosApp
    settings:
      base:
        INFOPLIST_FILE: iosApp/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.openmodality.ios
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        FRAMEWORK_SEARCH_PATHS:
          - "$(inherited)"
          - "$(SRCROOT)/../shared/build/xcode-frameworks/$(CONFIGURATION)/$(SDK_NAME)"
        OTHER_LDFLAGS:
          - "$(inherited)"
          - "-framework"
          - "Shared"
    preBuildScripts:
      - name: "Compile Kotlin Framework"
        script: |
          cd "$SRCROOT/.."
          ./gradlew :shared:embedAndSignAppleFrameworkForXcode
        basedOnDependencyAnalysis: false
